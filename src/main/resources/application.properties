spring.application.name=insight360-cli

# ── H2 em arquivo — dados persistem após fechar a aplicação ──────────
spring.datasource.url=jdbc:h2:file:./data/insight360
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── H2 Console (acesso via http://localhost:8080/h2-console) ─────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Aplicação CLI (sem servidor web ativo) ────────────────────────────
spring.main.web-application-type=none
spring.main.banner-mode=off

# ── Logs ──────────────────────────────────────────────────────────────
logging.level.root=ERROR
logging.level.br.com.totvs=INFO
logging.level.org.hibernate=ERROR
logging.level.org.springframework=ERROR
